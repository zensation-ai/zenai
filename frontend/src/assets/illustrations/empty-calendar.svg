<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Calendar body -->
  <rect x="18" y="30" width="84" height="74" rx="5" fill="currentColor" fill-opacity="0.05"/>
  <!-- Header bar -->
  <line x1="18" y1="48" x2="102" y2="48"/>
  <!-- Ring left -->
  <line x1="38" y1="22" x2="38" y2="38"/>
  <!-- Ring right -->
  <line x1="82" y1="22" x2="82" y2="38"/>
  <!-- Grid: 3 columns, 3 rows of day cells -->
  <!-- Row 1 -->
  <rect x="26" y="56" width="16" height="12" rx="2" opacity="0.5"/>
  <rect x="52" y="56" width="16" height="12" rx="2" opacity="0.5"/>
  <rect x="78" y="56" width="16" height="12" rx="2" opacity="0.5"/>
  <!-- Row 2 -->
  <rect x="26" y="74" width="16" height="12" rx="2" opacity="0.5"/>
  <rect x="52" y="74" width="16" height="12" rx="2" opacity="0.5"/>
  <rect x="78" y="74" width="16" height="12" rx="2" opacity="0.5"/>
  <!-- Row 3 (partial) -->
  <rect x="26" y="92" width="16" height="6" rx="2" opacity="0.3"/>
  <rect x="52" y="92" width="16" height="6" rx="2" opacity="0.3"/>
</svg>
