<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- ZenAI Gradient - Sunset Orange (Erkennungsmerkmal) -->
    <linearGradient id="zenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347"/>
      <stop offset="50%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ff6347"/>
    </linearGradient>
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Neural Connection Gradient -->
    <linearGradient id="neuralGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb347;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff6347;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Brain Structure - Left Hemisphere -->
  <path d="M35 55
           C30 45 32 35 42 28
           C50 22 60 25 62 32
           C64 25 74 22 82 28
           C92 35 94 45 89 55
           C94 60 95 70 88 80
           C82 88 72 92 62 90
           C52 92 42 88 36 80
           C29 70 30 60 35 55Z"
        fill="url(#zenGradient)"
        filter="url(#glow)"
        stroke="url(#neuralGradient)"
        stroke-width="1"/>

  <!-- Brain Center Line -->
  <path d="M62 32 L62 90"
        stroke="url(#neuralGradient)"
        stroke-width="2"
        stroke-dasharray="4,3"
        opacity="0.7"/>

  <!-- Left Brain Folds -->
  <path d="M38 45 C45 42 50 48 48 55"
        stroke="rgba(255,255,255,0.5)"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>
  <path d="M40 60 C48 55 55 62 50 70"
        stroke="rgba(255,255,255,0.4)"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>
  <path d="M42 75 C50 72 55 78 48 82"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>

  <!-- Right Brain Folds -->
  <path d="M86 45 C79 42 74 48 76 55"
        stroke="rgba(255,255,255,0.5)"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>
  <path d="M84 60 C76 55 69 62 74 70"
        stroke="rgba(255,255,255,0.4)"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>
  <path d="M82 75 C74 72 69 78 76 82"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>

  <!-- Neural Nodes - Representing AI Intelligence -->
  <circle cx="45" cy="40" r="3" fill="#fff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="79" cy="40" r="3" fill="#fff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="60" r="2.5" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="60" r="2.5" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="50" r="3.5" fill="#fff" opacity="1">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural Connections -->
  <line x1="45" y1="40" x2="62" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="79" y1="40" x2="62" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="50" y1="60" x2="62" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="74" y1="60" x2="62" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>
