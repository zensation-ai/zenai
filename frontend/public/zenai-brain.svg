<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium Sunset Orange Gradient - ZenAI Signature -->
    <linearGradient id="zenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347"/>
      <stop offset="40%" style="stop-color:#ff9f33"/>
      <stop offset="60%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ff6347"/>
    </linearGradient>
    <!-- Inner highlight gradient for depth -->
    <linearGradient id="brainHighlight" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Left hemisphere -->
  <path d="M24 50
           C24 38, 27 28, 35 23
           C40 20, 44 20, 47 22
           C49 24, 50 26, 50 28
           C50 32, 48 36, 47 40
           C46 44, 48 47, 49 50
           C50 53, 48 57, 46 62
           C44 67, 41 72, 37 74
           C32 76, 28 74, 26 70
           C24 65, 24 58, 24 50Z"
        fill="url(#zenGradient)"/>
  <!-- Left hemisphere highlight -->
  <path d="M28 45
           C28 38, 30 32, 36 28
           C40 25, 44 26, 46 30
           C45 34, 43 38, 42 42
           C40 38, 35 36, 32 40
           C29 44, 28 48, 28 45Z"
        fill="url(#brainHighlight)"/>

  <!-- Right hemisphere -->
  <path d="M76 50
           C76 38, 73 28, 65 23
           C60 20, 56 20, 53 22
           C51 24, 50 26, 50 28
           C50 32, 52 36, 53 40
           C54 44, 52 47, 51 50
           C50 53, 52 57, 54 62
           C56 67, 59 72, 63 74
           C68 76, 72 74, 74 70
           C76 65, 76 58, 76 50Z"
        fill="url(#zenGradient)"/>
  <!-- Right hemisphere highlight -->
  <path d="M72 45
           C72 38, 70 32, 64 28
           C60 25, 56 26, 54 30
           C55 34, 57 38, 58 42
           C60 38, 65 36, 68 40
           C71 44, 72 48, 72 45Z"
        fill="url(#brainHighlight)"/>

  <!-- Neural connections -->
  <line x1="34" y1="38" x2="50" y2="50" stroke="#ff8c00" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="66" y1="38" x2="50" y2="50" stroke="#ff8c00" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="36" y1="66" x2="50" y2="50" stroke="#ff8c00" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="64" y1="66" x2="50" y2="50" stroke="#ff8c00" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Neural nodes with smooth animations -->
  <circle cx="34" cy="38" r="2.5" fill="#ff9f33">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="52" r="2.2" fill="#ff9f33">
    <animate attributeName="opacity" values="0.85;0.45;0.85" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="66" r="2.2" fill="#ff9f33">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="66" cy="38" r="2.5" fill="#ff9f33">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="52" r="2.2" fill="#ff9f33">
    <animate attributeName="opacity" values="0.85;0.45;0.85" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="64" cy="66" r="2.2" fill="#ff9f33">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <!-- Central node - larger, brighter -->
  <circle cx="50" cy="50" r="4" fill="#ffb347">
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
