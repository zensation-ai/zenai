<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium Sunset Orange Gradient - ZenAI Signature -->
    <linearGradient id="zenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347"/>
      <stop offset="35%" style="stop-color:#ff9f33"/>
      <stop offset="50%" style="stop-color:#ff8c00"/>
      <stop offset="65%" style="stop-color:#ff7a1a"/>
      <stop offset="100%" style="stop-color:#ff6347"/>
    </linearGradient>
    <!-- Inner highlight gradient for depth -->
    <linearGradient id="brainHighlight" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Soft glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Left hemisphere - organic curves -->
    <path d="M24 50
             C24 38, 27 28, 35 23
             C40 20, 44 20, 47 22
             C49 24, 50 26, 50 28
             C50 32, 48 36, 47 40
             C46 44, 48 47, 49 50
             C50 53, 48 57, 46 62
             C44 67, 41 72, 37 74
             C32 76, 28 74, 26 70
             C24 65, 24 58, 24 50Z"
          fill="url(#zenGradient)"/>
    <!-- Left hemisphere highlight -->
    <path d="M28 45
             C28 38, 30 32, 36 28
             C40 25, 44 26, 46 30
             C45 34, 43 38, 42 42
             C40 38, 35 36, 32 40
             C29 44, 28 48, 28 45Z"
          fill="url(#brainHighlight)"/>

    <!-- Right hemisphere - organic curves -->
    <path d="M76 50
             C76 38, 73 28, 65 23
             C60 20, 56 20, 53 22
             C51 24, 50 26, 50 28
             C50 32, 52 36, 53 40
             C54 44, 52 47, 51 50
             C50 53, 52 57, 54 62
             C56 67, 59 72, 63 74
             C68 76, 72 74, 74 70
             C76 65, 76 58, 76 50Z"
          fill="url(#zenGradient)"/>
    <!-- Right hemisphere highlight -->
    <path d="M72 45
             C72 38, 70 32, 64 28
             C60 25, 56 26, 54 30
             C55 34, 57 38, 58 42
             C60 38, 65 36, 68 40
             C71 44, 72 48, 72 45Z"
          fill="url(#brainHighlight)"/>

    <!-- Brain folds - left (gyri/sulci) -->
    <path d="M28 36 Q33 32, 38 36 Q43 40, 44 45"
          stroke="rgba(255,255,255,0.55)"
          stroke-width="1.8"
          stroke-linecap="round"
          fill="none"/>
    <path d="M27 50 Q34 46, 40 50 Q46 54, 45 60"
          stroke="rgba(255,255,255,0.45)"
          stroke-width="1.6"
          stroke-linecap="round"
          fill="none"/>
    <path d="M30 64 Q36 60, 40 64 Q44 68, 42 72"
          stroke="rgba(255,255,255,0.35)"
          stroke-width="1.4"
          stroke-linecap="round"
          fill="none"/>

    <!-- Brain folds - right (gyri/sulci) -->
    <path d="M72 36 Q67 32, 62 36 Q57 40, 56 45"
          stroke="rgba(255,255,255,0.55)"
          stroke-width="1.8"
          stroke-linecap="round"
          fill="none"/>
    <path d="M73 50 Q66 46, 60 50 Q54 54, 55 60"
          stroke="rgba(255,255,255,0.45)"
          stroke-width="1.6"
          stroke-linecap="round"
          fill="none"/>
    <path d="M70 64 Q64 60, 60 64 Q56 68, 58 72"
          stroke="rgba(255,255,255,0.35)"
          stroke-width="1.4"
          stroke-linecap="round"
          fill="none"/>

    <!-- Corpus callosum - central connection -->
    <path d="M50 30 C50 35, 50 40, 50 50 C50 60, 50 65, 50 70"
          stroke="rgba(255,255,255,0.25)"
          stroke-width="1.2"
          stroke-dasharray="4,3"
          stroke-linecap="round"
          fill="none"/>

    <!-- Neural nodes - synaptic points with animations -->
    <circle cx="34" cy="38" r="2.2" fill="#fff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="52" r="2" fill="#fff" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.35;0.85" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="66" r="1.8" fill="#fff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="38" r="2.2" fill="#fff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="52" r="2" fill="#fff" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.35;0.85" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="66" r="1.8" fill="#fff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Central node - larger, brighter -->
    <circle cx="50" cy="50" r="3.5" fill="#fff" opacity="1">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Additional synaptic detail -->
    <circle cx="44" cy="42" r="1.5" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="42" r="1.5" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
