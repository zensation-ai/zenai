name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Backend: Lint + TypeScript Check
  # ============================================
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: backend
        run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # ============================================
  # Backend: ALL Tests (unit + integration + service)
  # ============================================
  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run all tests
        working-directory: backend
        run: npm test -- --forceExit --detectOpenHandles --maxWorkers=2
        timeout-minutes: 20
        env:
          NODE_ENV: test
          NODE_OPTIONS: --max-old-space-size=4096
          CI: true
          SKIP_EXTERNAL_SERVICES: true

  # ============================================
  # Frontend: Build + TypeScript Check
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ============================================
  # Frontend: Vitest Unit Tests
  # ============================================
  test-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm run test
        timeout-minutes: 5

  # ============================================
  # Deploy notification (main only)
  # ============================================
  deploy:
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy notification
        run: |
          echo "Build successful!"
          echo "Railway will auto-deploy from GitHub integration"
