name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Install dependencies (shared across jobs)
  # ============================================
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ============================================
  # Backend: Lint + TypeScript Check
  # ============================================
  lint-backend:
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: backend
        run: pnpm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # ============================================
  # Frontend: TypeScript Check
  # ============================================
  lint-frontend:
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ============================================
  # Backend: Tests (sharded across 3 parallel jobs)
  # ============================================
  test-backend:
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: Run backend tests (shard ${{ matrix.shard }}/5)
        working-directory: backend
        run: pnpm test -- --forceExit --detectOpenHandles --maxWorkers=1 --shard=${{ matrix.shard }}/5
        env:
          NODE_ENV: test
          NODE_OPTIONS: --max-old-space-size=6144
          CI: true
          SKIP_EXTERNAL_SERVICES: true

  # ============================================
  # Frontend: Vitest Unit Tests
  # ============================================
  test-frontend:
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test
        timeout-minutes: 5
        env:
          CI: true

  # ============================================
  # Frontend: Production Build
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fresh)
        run: |
          rm -rf node_modules frontend/node_modules backend/node_modules
          pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

  # ============================================
  # Backend: Production Build
  # ============================================
  build-backend:
    runs-on: ubuntu-latest
    needs: [lint-backend]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: Build backend
        working-directory: backend
        run: pnpm run build

  # ============================================
  # Deploy gate (main only)
  # ============================================
  deploy-ready:
    needs: [test-backend, test-frontend, build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy notification
        run: |
          echo "All checks passed - deploy ready"
          echo "Railway auto-deploys from main branch"
          echo "Vercel auto-deploys frontend from main branch"
